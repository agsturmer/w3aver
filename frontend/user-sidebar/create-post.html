<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New post</title>
</head>
<body>

     <section id="new-post" class="new-post">
        
        <h1 class="settings__title">Create post</h1>

        <input class="new-post__url-input" type="url" placeholder="Paste your url here...">

        <label class="new-post__label">
            <input type="radio" name="img-or-description" value="image"> add an image
        </label>
        
        <label class="new-post__label">
            <input type="radio" name="img-or-description" value="description"> add a description
        </label>

        <div class="new-post__verify-div">
            <button class="new-post__verify-button">Verify</button>
           <!-- <p>Successfully verified!</p> -->
        </div>

        <article class="post new-post__article">
            <div class="post__profile">
                <div class="post__profile-left">
                    <img src="imgs/1.jpg" class="post__favicon">
                    <a>doritos.com</a>
                </div>
                <button class="post__subscribe">subscribe</button>
            </div>
            <h2 class="post__title">Título teste para W3aver</h2>
            <img src="https://agsturmer.github.io/example/img.jpg" class="post__img">
            <div class="post__bottom">
                <time class="post__data">2y ago</time>
                <button class="post__bookmark-button">
                    <svg class="post__bookmark-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2 2 0 0 1 2 2v15a1 1 0 0 1-1.496.868l-4.512-2.578a2 2 0 0 0-1.984 0l-4.512 2.578A1 1 0 0 1 5 20V5a2 2 0 0 1 2-2z"/></svg>
                </button>
            </div>
        </article>

        <div class="new-post__publish-div">
            <button class="new-post__publish-button">Publish your post</button>
        </div>

        <a href="../index.html" class="go-back-button"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14 4 9l5-5"/><path d="M4 9h10.5a5.5 5.5 0 0 1 5.5 5.5a5.5 5.5 0 0 1-5.5 5.5H11"/></svg></a>
